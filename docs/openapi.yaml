  # ===================== Supervisor (separate app) =====================
  # NOTE: These two paths are served by the Supervisor control-plane app
  # (apps/supervisor), NOT by this app's port. Use the Supervisor `server` entry
  # above. Auth is the Supervisor's own CF Access JWT or OIDC session with an
  # `operator` role gate (NOT this app's API keys).
  /api/instances/{id}/agent:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Supervisor]
      summary: Launch an agent run on an instance (operator)
      description: >-
        Proxies a manual agent run into instance `{id}`'s data-plane
        /api/agent-runs. Owner-scoped (404, not 403, when missing/invisible). A
        suspended instance is woken first (wake-on-traffic); a
        provisioning/terminating instance yields 409. The response mirrors the
        instance's /api/agent-runs reply.
      security:
        - supervisorCfAccess: []
        - supervisorSession: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SupervisorAgentRunInput' } } } }
      responses:
        '202': { description: Run launched (proxied from the instance), content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Instance not launchable (provisioning/terminating), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  /api/delegate:
    post:
      tags: [Supervisor]
      summary: Cross-instance delegation — resolve-or-provision then launch (operator)
      description: >-
        Resolves the target instance by `toSlug`. If it exists and is
        ready/suspended, delegates the run via the same dispatch path as
        /api/instances/{id}/agent. If it is missing and `provisionIfMissing` is
        set, a new instance is queued (inserted `requested`) and a 202
        `{ status: "provisioning" }` is returned so the caller polls until ready
        and re-delegates.
      security:
        - supervisorCfAccess: []
        - supervisorSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SupervisorAgentRunInput'
                - type: object
                  required: [toSlug]
                  properties:
                    toSlug: { type: string, description: Target instance slug }
                    provisionIfMissing: { type: boolean, description: Create the instance when it does not exist }
      responses:
        '202':
          description: Run launched (proxied) OR a new instance was queued for provisioning
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: true
                    description: Proxied /api/agent-runs response from the target instance
                  - type: object
                    properties:
                      status: { type: string, example: provisioning }
                      instanceId: { type: string }
                      slug: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Target instance not found (and provisionIfMissing not set), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Slug already in use, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      bearerFormat: rdv_<key>
      description: API key as a bearer token (handlers wrapped with withApiAuth)
    sessionCookie:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: NextAuth session cookie (browser)
    cronSecret:
      type: http
      scheme: bearer
      description: CRON_SECRET as a bearer token (or ?secret= query param)
    supervisorCfAccess:
      type: apiKey
      in: cookie
      name: CF_Authorization
      description: >-
        Supervisor app's Cloudflare Access JWT (production). The authenticated
        email is mapped to a supervisor_user with a role; Supervisor endpoints
        additionally require the resolved role (e.g. operator).
    supervisorSession:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: >-
        Supervisor app's NextAuth (OIDC) session cookie — the native-login
        alternative to Cloudflare Access for Supervisor endpoints.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string }
  responses:
    Success:
      description: Generic success
      content:
        application/json:
          schema: { type: object, properties: { success: { type: boolean, example: true } } }
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Not authorized for this resource/path
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        code: { type: string }
        details: { type: string }
    IdsOrAll:
      type: object
      properties:
        ids: { type: array, items: { type: string } }
        all: { type: boolean }
    Session:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        tmuxSessionName: { type: string }
        projectPath: { type: string, nullable: true }
        projectId: { type: string, nullable: true }
        githubRepoId: { type: string, nullable: true }
        worktreeBranch: { type: string, nullable: true }
        terminalType: { type: string, enum: [shell, agent, ssh, file, browser, loop] }
        agentProvider: { type: string, nullable: true }
        agentExitState: { type: string, nullable: true }
        status: { type: string, enum: [active, suspended, closed] }
        tabOrder: { type: integer }
        parentSessionId: { type: string, nullable: true }
        lastActivityAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateSessionInput:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string, description: "Required (alias: folderId)" }
        folderId: { type: string, description: Legacy alias for projectId }
        name: { type: string }
        projectPath: { type: string }
        terminalType: { type: string, enum: [shell, agent, ssh, file, browser, loop] }
        githubRepoId: { type: string }
        worktreeBranch: { type: string }
        createWorktree: { type: boolean }
        baseBranch: { type: string }
        worktreeType: { type: string }
        featureDescription: { type: string }
        filePath: { type: string }
        profileId: { type: string }
        agentProvider: { type: string }
        autoLaunchAgent: { type: boolean }
        agentFlags: { type: array, items: { type: string } }
        parentSessionId: { type: string }
        loopConfig: { type: object, additionalProperties: true }
        sshConnectionId: { type: string }
        scopeKey: { type: string, nullable: true }
        typeMetadata: { type: object, additionalProperties: true }
    Group:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        parentGroupId: { type: string, nullable: true }
        sortOrder: { type: integer }
        collapsed: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Project:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        groupId: { type: string }
        name: { type: string }
        sortOrder: { type: integer }
        collapsed: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Task:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        projectId: { type: string, nullable: true }
        sessionId: { type: string, nullable: true }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [open, in_progress, done, cancelled] }
        priority: { type: string, enum: [critical, high, medium, low] }
        source: { type: string, enum: [manual, agent] }
        labels:
          type: array
          items: { type: object, properties: { name: { type: string }, color: { type: string } } }
        subtasks:
          type: array
          items: { type: object, properties: { id: { type: string }, title: { type: string }, completed: { type: boolean } } }
        blockedBy: { type: array, items: { type: string } }
        owner: { type: string, nullable: true }
        dueDate: { type: string, format: date-time, nullable: true }
        githubIssueUrl: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateTaskInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
        projectId: { type: string, nullable: true }
        sessionId: { type: string, nullable: true }
        description: { type: string, nullable: true }
        status: { type: string, enum: [open, in_progress, done, cancelled] }
        priority: { type: string, enum: [critical, high, medium, low] }
        source: { type: string, enum: [manual, agent] }
        labels:
          type: array
          items: { type: object, properties: { name: { type: string }, color: { type: string } } }
        subtasks:
          type: array
          items: { type: object, properties: { id: { type: string }, title: { type: string }, completed: { type: boolean } } }
        blockedBy: { type: array, items: { type: string } }
        owner: { type: string, nullable: true }
        dueDate: { type: string, nullable: true }
        githubIssueUrl: { type: string, nullable: true }
        instructions: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
        sortOrder: { type: integer }
    Channel:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        groupId: { type: string }
        name: { type: string }
        topic: { type: string, nullable: true }
        unreadCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SshConnection:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        projectId: { type: string, nullable: true }
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        authType: { type: string, enum: [key, agent, password, system] }
        hasPassphrase: { type: boolean }
        knownHostsPolicy: { type: string, enum: [strict, accept-new, no] }
        extraOptions: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateSshConnectionInput:
      type: object
      required: [name, host, username, authType]
      properties:
        name: { type: string }
        host: { type: string }
        username: { type: string }
        authType: { type: string, enum: [key, agent, password, system] }
        port: { type: integer }
        password: { type: string }
        hasPassphrase: { type: boolean }
        knownHostsPolicy: { type: string, enum: [strict, accept-new, no] }
        extraOptions: { type: array, items: { type: string } }
        projectId: { type: string, nullable: true }
        privateKey: { type: string }
        publicKey: { type: string }
        generateKeypair: { type: boolean }
    ApiKey:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        keyPrefix: { type: string }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    Readiness:
      type: object
      properties:
        ready: { type: boolean }
        checks:
          type: object
          properties:
            db: { $ref: '#/components/schemas/CheckResult' }
            tmux: { $ref: '#/components/schemas/CheckResult' }
            terminal: { $ref: '#/components/schemas/CheckResult' }
    CheckResult:
      type: object
      properties:
        ok: { type: boolean }
        error: { type: string }
    AgentScheduleInput:
      type: object
      description: >-
        Create a scheduled REAL agent run (epic remote-dev-oyej). A run launches
        a fresh agent-type session with the prompt — distinct from /api/schedules,
        which sends keystrokes to an existing session.
      required: [projectId, name, prompt]
      properties:
        projectId: { type: string }
        name: { type: string }
        prompt: { type: string }
        agentProvider: { type: string, description: "Agent CLI id (default: claude)" }
        agentFlags: { type: array, items: { type: string } }
        worktreeType: { type: string, nullable: true }
        baseBranch: { type: string, nullable: true }
        scheduleType: { type: string, enum: [recurring, one-time], description: "recurring → cronExpression; one-time → scheduledAt" }
        cronExpression: { type: string, nullable: true }
        scheduledAt: { type: string, format: date-time, nullable: true }
        timezone: { type: string }
        enabled: { type: boolean }
        maxRetries: { type: integer }
    TriggerConfigInput:
      type: object
      description: A GitHub-event → agent-run trigger config (epic remote-dev-oyej).
      required: [projectId, name, kind, promptTemplate]
      properties:
        projectId: { type: string }
        githubRepoId: { type: string, nullable: true }
        name: { type: string }
        kind: { type: string, enum: [pr_labeled, issue_opened, ci_failed] }
        filter:
          type: object
          additionalProperties: true
          description: 'JSON-serializable event filter, e.g. { "label": "agent:fix" }'
        agentProvider: { type: string }
        agentFlags: { type: array, items: { type: string } }
        promptTemplate: { type: string }
        worktreeType: { type: string, nullable: true }
        enabled: { type: boolean }
    ManualRunInput:
      type: object
      description: Immediate manual agent launch (source "manual").
      required: [projectId, prompt]
      properties:
        projectId: { type: string }
        prompt: { type: string }
        agentProvider: { type: string, description: "default: claude" }
        agentFlags: { type: array, items: { type: string } }
        worktreeType: { type: string, nullable: true }
        baseBranch: { type: string, nullable: true }
    CrownStartInput:
      type: object
      description: Start a Crown best-of-N run (async; poll GET /api/crown/{id}).
      required: [projectId, prompt]
      properties:
        projectId: { type: string }
        prompt: { type: string }
        count: { type: integer, minimum: 1, maximum: 10, default: 2, description: Number of parallel candidate runs }
        agentProvider: { type: string, description: "default: claude" }
        judgeModel: { type: string }
        baseBranch: { type: string, nullable: true }
        timeoutMs: { type: integer }
    SupervisorAgentRunInput:
      type: object
      description: Agent-run body proxied into a target instance's /api/agent-runs.
      required: [projectId, prompt]
      properties:
        projectId: { type: string }
        prompt: { type: string }
        agentProvider: { type: string }
        agentFlags: { type: array, items: { type: string } }
        worktreeType: { type: string, nullable: true }
        baseBranch: { type: string, nullable: true }
