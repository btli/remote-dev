openapi: 3.0.3
info:
  title: Remote Dev API
  description: |
    API for Remote Dev - a web-based terminal interface with persistent sessions,
    GitHub integration, and session management features.
  version: 1.0.0
  contact:
    name: Remote Dev
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: http://localhost:6001
    description: Production server

tags:
  - name: Sessions
    description: Terminal session management
  - name: Groups
    description: Project groups (containers; preferences only)
  - name: Projects
    description: Projects (leaves; own sessions, tasks, channels)
  - name: NodePreferences
    description: Polymorphic preferences for groups or projects
  - name: Preferences
    description: User settings and active node selection
  - name: Templates
    description: Reusable session templates
  - name: Recordings
    description: Terminal session recordings
  - name: GitHub
    description: GitHub repository integration
  - name: Git
    description: Git repository utilities
paths:
  # Sessions API
  /api/sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      description: Get all terminal sessions for the current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, closed]
          description: Filter by session status
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Sessions]
      summary: Create session
      description: Create a new terminal session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/sessions/{id}:
    get:
      tags: [Sessions]
      summary: Get session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Sessions]
      summary: Update session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: '#/components/schemas/Session'

    delete:
      tags: [Sessions]
      summary: Delete session
      description: Close and delete a session
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: deleteWorktree
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: Also delete git worktree from disk
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/sessions/{id}/suspend:
    post:
      tags: [Sessions]
      summary: Suspend session
      description: Suspend an active session (keeps tmux running)
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/sessions/{id}/resume:
    post:
      tags: [Sessions]
      summary: Resume session
      description: Resume a suspended session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: tmux session no longer exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{id}/folder:
    put:
      tags: [Sessions]
      summary: Move session to project
      description: |
        Moves the session to a different project (or detaches it). The path
        retains `/folder` for backwards compatibility, but the underlying
        column is `terminal_session.project_id`. The body accepts either
        `projectId` (preferred) or `folderId` (legacy alias).
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Project UUID (null to detach)
                folderId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Legacy alias for `projectId`
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/sessions/{id}/token:
    get:
      tags: [Sessions]
      summary: Get session WebSocket token
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: WebSocket authentication token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /api/sessions/reorder:
    post:
      tags: [Sessions]
      summary: Reorder sessions
      description: Update tab order for multiple sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionIds
              properties:
                sessionIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # Project Groups API
  /api/groups:
    get:
      tags: [Groups]
      summary: List groups
      responses:
        '200':
          description: List of project groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'

    post:
      tags: [Groups]
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - parentGroupId
              properties:
                name:
                  type: string
                parentGroupId:
                  type: string
                  format: uuid
                  nullable: true
                sortOrder:
                  type: integer
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'

  /api/groups/{id}:
    get:
      tags: [Groups]
      summary: Get group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'

    patch:
      tags: [Groups]
      summary: Update group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                collapsed:
                  type: boolean
                sortOrder:
                  type: integer
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'

    delete:
      tags: [Groups]
      summary: Delete group
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - name: force
          in: query
          schema:
            type: boolean
          description: Required when the group has descendants
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/groups/{id}/move:
    post:
      tags: [Groups]
      summary: Move group to a new parent
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newParentGroupId
              properties:
                newParentGroupId:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # Projects API
  /api/projects:
    get:
      tags: [Projects]
      summary: List projects
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter to one group; omit to list every project the user owns
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'

    post:
      tags: [Projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - groupId
                - name
              properties:
                groupId:
                  type: string
                  format: uuid
                name:
                  type: string
                sortOrder:
                  type: integer
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'

  /api/projects/{id}:
    get:
      tags: [Projects]
      summary: Get project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'

    patch:
      tags: [Projects]
      summary: Update project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                collapsed:
                  type: boolean
                sortOrder:
                  type: integer
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'

    delete:
      tags: [Projects]
      summary: Delete project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/projects/{id}/move:
    post:
      tags: [Projects]
      summary: Move project to a different group
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newGroupId
              properties:
                newGroupId:
                  type: string
                  format: uuid
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # Node Preferences API
  /api/node-preferences/{ownerType}/{ownerId}:
    get:
      tags: [NodePreferences]
      summary: Get node preferences
      parameters:
        - $ref: '#/components/parameters/NodeOwnerType'
        - $ref: '#/components/parameters/NodeOwnerId'
      responses:
        '200':
          description: Preferences (null if none stored)
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    nullable: true
                    type: object
                    additionalProperties: true

    put:
      tags: [NodePreferences]
      summary: Upsert node preferences
      description: |
        Group preferences accept a restricted subset of fields (no
        `localRepoPath`); project preferences accept the full schema. See
        `NodePreferences.forGroup` / `NodePreferences.forProject` in
        `src/domain/value-objects/NodePreferences.ts`.
      parameters:
        - $ref: '#/components/parameters/NodeOwnerType'
        - $ref: '#/components/parameters/NodeOwnerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Success'

    delete:
      tags: [NodePreferences]
      summary: Delete node preferences
      parameters:
        - $ref: '#/components/parameters/NodeOwnerType'
        - $ref: '#/components/parameters/NodeOwnerId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # Preferences API
  /api/preferences:
    get:
      tags: [Preferences]
      summary: Get preferences
      description: Get user settings and all node preferences
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  userSettings:
                    $ref: '#/components/schemas/UserSettings'
                  nodePreferences:
                    type: array
                    items:
                      $ref: '#/components/schemas/NodePreferencesEntry'

    patch:
      tags: [Preferences]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdate'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'

  /api/preferences/active-node:
    post:
      tags: [Preferences]
      summary: Set the active node (group or project)
      description: |
        Selects the active node. When `nodeType` is `group`, project-scoped
        views (tasks, channels, peer messages) aggregate across every
        descendant project. When `nodeType` is `project`, those views filter
        to that single project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nodeId
                - nodeType
              properties:
                nodeId:
                  type: string
                  format: uuid
                nodeType:
                  type: string
                  enum: [group, project]
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # Templates API
  /api/templates:
    get:
      tags: [Templates]
      summary: List templates
      responses:
        '200':
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'

    post:
      tags: [Templates]
      summary: Create template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

  /api/templates/{id}:
    get:
      tags: [Templates]
      summary: Get template
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

    post:
      tags: [Templates]
      summary: Record template usage
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum: [use]
      responses:
        '200':
          $ref: '#/components/responses/Success'

    patch:
      tags: [Templates]
      summary: Update template
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

    delete:
      tags: [Templates]
      summary: Delete template
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # Recordings API
  /api/recordings:
    get:
      tags: [Recordings]
      summary: List recordings
      responses:
        '200':
          description: List of recordings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recording'

    post:
      tags: [Recordings]
      summary: Create recording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordingRequest'
      responses:
        '201':
          description: Recording saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recording'

  /api/recordings/{id}:
    get:
      tags: [Recordings]
      summary: Get recording
      parameters:
        - $ref: '#/components/parameters/RecordingId'
        - name: parsed
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: Return parsed recording data
      responses:
        '200':
          description: Recording with data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingWithData'

    patch:
      tags: [Recordings]
      summary: Update recording
      parameters:
        - $ref: '#/components/parameters/RecordingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                sessionId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Recording updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recording'

    delete:
      tags: [Recordings]
      summary: Delete recording
      parameters:
        - $ref: '#/components/parameters/RecordingId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  # GitHub API
  /api/github/repositories:
    get:
      tags: [GitHub]
      summary: List repositories
      parameters:
        - name: cached
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: Return only cloned repositories
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 100
        - name: sort
          in: query
          schema:
            type: string
            enum: [updated, created, pushed, full_name]
            default: updated
      responses:
        '200':
          description: List of repositories
          content:
            application/json:
              schema:
                type: object
                properties:
                  repositories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Repository'
                  page:
                    type: integer
                  hasMore:
                    type: boolean
        '400':
          description: GitHub not connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum: [GITHUB_NOT_CONNECTED]

  /api/github/repositories/{id}:
    get:
      tags: [GitHub]
      summary: Get repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Database UUID or GitHub numeric ID
      responses:
        '200':
          description: Repository details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'

    post:
      tags: [GitHub]
      summary: Clone repository
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repository cloned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  localPath:
                    type: string
                  repositoryId:
                    type: string
                    format: uuid

  /api/github/repositories/{id}/branches:
    get:
      tags: [GitHub]
      summary: List branches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  branches:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        isRemote:
                          type: boolean
                        isDefault:
                          type: boolean

  /api/github/repositories/{id}/folders:
    get:
      tags: [GitHub]
      summary: Get folder structure
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: maxDepth
          in: query
          schema:
            type: integer
            default: 3
      responses:
        '200':
          description: Folder structure
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      $ref: '#/components/schemas/FolderTree'
                  rootPath:
                    type: string

  /api/github/worktrees:
    post:
      tags: [GitHub]
      summary: Create worktree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repositoryId
                - branch
              properties:
                repositoryId:
                  type: string
                  format: uuid
                branch:
                  type: string
                createNewBranch:
                  type: boolean
                baseBranch:
                  type: string
      responses:
        '200':
          description: Worktree created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  worktreePath:
                    type: string
                  branch:
                    type: string

    delete:
      tags: [GitHub]
      summary: Delete worktree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repositoryId
                - worktreePath
              properties:
                repositoryId:
                  type: string
                  format: uuid
                worktreePath:
                  type: string
                force:
                  type: boolean
                  default: false
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/github/worktrees/check:
    post:
      tags: [GitHub]
      summary: Check worktree status
      description: Check for uncommitted changes in a worktree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repositoryId
                - worktreePath
              properties:
                repositoryId:
                  type: string
                  format: uuid
                worktreePath:
                  type: string
      responses:
        '200':
          description: Worktree status
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasUncommittedChanges:
                    type: boolean
                  branch:
                    type: string

  # Git API
  /api/git/validate:
    get:
      tags: [Git]
      summary: Validate repository
      description: Check if a path is a valid git repository
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Filesystem path to validate
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  isGitRepo:
                    type: boolean
                  branches:
                    type: array
                    items:
                      type: string

  # Images API
  /api/images:
    post:
      tags: [Images]
      summary: Upload image
      description: Upload an image and save to filesystem
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
          application/json:
            schema:
              type: object
              required:
                - data
                - mediaType
              properties:
                data:
                  type: string
                  description: Base64-encoded image data
                mediaType:
                  type: string
                  enum: [image/jpeg, image/png, image/gif, image/webp]
      responses:
        '200':
          description: Image uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  size:
                    type: integer
                  mediaType:
                    type: string

components:
  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tmuxSessionName:
          type: string
        projectPath:
          type: string
          nullable: true
        githubRepoId:
          type: string
          format: uuid
          nullable: true
        worktreeBranch:
          type: string
          nullable: true
        projectId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
