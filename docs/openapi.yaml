      tags: [Automation]
      summary: Get an agent schedule
      responses:
        '200': { description: Schedule, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Automation]
      summary: Update an agent schedule
      description: Updates the schedule and notifies the agent scheduler.
      requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses:
        '200': { description: Updated schedule, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
