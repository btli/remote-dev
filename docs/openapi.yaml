  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session UUID

    GroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project group UUID

    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project UUID

    NodeOwnerType:
      name: ownerType
      in: path
      required: true
      schema:
        type: string
        enum: [group, project]
      description: Node discriminator

    NodeOwnerId:
      name: ownerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Group or project UUID

    TemplateId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Template UUID

    RecordingId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Recording UUID

  responses:
    Success:
      description: Operation successful
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                const: true

    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth session cookie

security:
  - sessionCookie: []
