  # ===================== Schedules =====================
  /api/schedules:
    get:
      tags: [Schedules]
      summary: List schedules
      parameters: [{ name: sessionId, in: query, schema: { type: string } }]
      responses: { '200': { description: Schedules, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    post:
      tags: [Schedules]
      summary: Create schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, name, commands]
              properties:
                sessionId: { type: string }
                name: { type: string }
                commands: { type: array, items: { type: string }, minItems: 1 }
                scheduleType: { type: string, enum: [one-time, recurring], default: one-time }
                cronExpression: { type: string }
                scheduledAt: { type: string, format: date-time }
                timezone: { type: string }
                enabled: { type: boolean }
                maxRetries: { type: integer }
                retryDelaySeconds: { type: integer }
                timeoutSeconds: { type: integer }
      responses: { '201': { description: Created schedule, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/schedules/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get: { tags: [Schedules], summary: Get schedule, responses: { '200': { description: Schedule, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, '404': { $ref: '#/components/responses/NotFound' } } }
    patch:
      tags: [Schedules]
      summary: Update schedule
      requestBody: { content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses: { '200': { description: Updated schedule, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    delete: { tags: [Schedules], summary: Delete schedule, responses: { '200': { $ref: '#/components/responses/Success' } } }
  /api/schedules/{id}/execute:
