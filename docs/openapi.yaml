openapi: 3.1.0
info:
  title: Remote Dev API
  version: 0.3.18
  description: |
    REST API for Remote Dev — a web-based terminal interface with persistent
    tmux-backed sessions, multi-agent CLI support, GitHub integration, project
    organization, tasks, channels, and more.

    Served by the Next.js app on `/api/*` (default port 6001). This spec covers
    the public HTTP API only.

    NOTE: The terminal server (default port 6002) additionally exposes
    `/internal/*` routes (`/internal/peers/*`, `/internal/channels/*`,
    `/internal/litellm/*`, `/health`). Those are an in-process control channel
    between the Next.js app and the terminal server, are NOT user-authenticated
    endpoints, and are intentionally out of scope here. See `src/server/`.

    Authentication is dual: NextAuth session cookies (browser) or an
    `Authorization: Bearer rdv_<key>` API key. Handlers wrapped with `withAuth`
    accept the session cookie only; handlers wrapped with `withApiAuth` accept
    either. A small set of endpoints use other mechanisms (HMAC for the deploy
    webhook, a shared secret for cron and the LiteLLM webhook, and the Kubernetes
    health probes which are unauthenticated).
  contact:
    name: Remote Dev
  license:
    name: MIT

servers:
  - url: http://localhost:6001
    description: Next.js app (default)
  - url: http://localhost:6001{basePath}
    description: Multi-instance deployment with RDV_BASE_PATH
    variables:
      basePath:
        default: ""
        description: e.g. /alpha
  - url: https://supervisor.example.com
    description: >-
      Supervisor control plane (apps/supervisor — a SEPARATE Next.js app/port).
      Hosts only the Supervisor-tagged paths (/api/instances/{id}/agent,
      /api/delegate). Replace the host with your deployment.

tags:
  - name: Sessions
    description: Terminal session lifecycle and I/O
  - name: Session Browser
    description: Headless browser automation for browser-type sessions
  - name: Session MCP
    description: Per-session MCP server config (on disk)
  - name: Groups
    description: Project groups (nestable containers; preferences only)
  - name: Projects
    description: Projects (leaves; own sessions, tasks, channels)
  - name: NodePreferences
    description: Polymorphic preferences for a group or project
  - name: Preferences
    description: User settings and active-node selection
  - name: Templates
    description: Reusable session templates
  - name: Recordings
    description: Terminal session recordings
  - name: Tasks
    description: Project task tracker
  - name: Channels
    description: Project-scoped chat channels and threads
  - name: Notifications
    description: User notifications and push tokens
  - name: Peers
    description: Inter-agent peer discovery and messaging (read side)
  - name: GitHub
    description: GitHub repository integration
  - name: GitHubAccounts
    description: Multi-account GitHub linking and bindings
  - name: ApiKeys
    description: API keys for programmatic access
  - name: Profiles
    description: Agent profiles and per-profile config
  - name: AgentCLI
    description: Agent CLI installation status
  - name: AgentProviders
    description: Supported agent providers
  - name: AgentConfigs
    description: Agent instruction files (CLAUDE.md, AGENTS.md, ...)
  - name: ClaudeSessions
    description: Resumable Claude Code sessions
  - name: MCPServers
    description: User/folder MCP server registry
  - name: Secrets
    description: External secrets-manager integration
  - name: SSH
    description: SSH connection definitions
  - name: Schedules
    description: Scheduled command execution
  - name: Ports
    description: Port registry and framework/runtime detection
  - name: LiteLLM
    description: LiteLLM proxy config, models, control, analytics
  - name: Beads
    description: Read-only bridge to the bd issue tracker
  - name: Trash
    description: Polymorphic trash with retention
  - name: Appearance
    description: User appearance settings
  - name: Dashboard
    description: Activity and usage dashboard
  - name: System
    description: Application logs and self-update
  - name: Tmux
    description: Low-level tmux session inspection
  - name: Files
    description: File read/write/probe for the editor
  - name: Directories
    description: Filesystem directory browsing
  - name: Git
    description: Git repository utilities
  - name: Images
    description: Image upload
  - name: Config
    description: Runtime configuration probe
  - name: Setup
    description: First-run setup wizard
  - name: Health
    description: Kubernetes liveness/readiness probes
  - name: Deploy
    description: Blue-green deploy webhook (HMAC)
  - name: Cron
    description: Scheduled maintenance endpoints (shared secret)
  - name: Automation
    description: >-
      Agent automation & orchestration (epic remote-dev-oyej): scheduled and
      GitHub-triggered REAL agent runs. See docs/AUTOMATION.md.
  - name: Crown
    description: Crown best-of-N — fan out N agent runs, judge, and auto-PR the winner
  - name: Supervisor
    description: >-
      Multi-instance Supervisor control plane (separate Next.js app, NOT served
      by this app's port). Operator-gated agent launch and cross-instance
      delegation. See docs/SUPERVISOR_DEPLOY.md.
  - name: Auth
    description: NextAuth and OAuth endpoints

security:
  - apiKey: []
  - sessionCookie: []

paths:
  # ============================ Sessions ============================
  /api/sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      parameters:
        - { name: status, in: query, schema: { type: string }, description: "Comma-separated: active,suspended,closed" }
        - { name: parentSessionId, in: query, schema: { type: string } }
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Sessions]
      summary: Create session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSessionInput' }
      responses:
        '201':
          description: Created (or 200 with _reused on dedup hit)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/sessions/reorder:
    post:
      tags: [Sessions]
      summary: Reorder session tabs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionIds]
              properties:
                sessionIds: { type: array, items: { type: string } }
      responses:
        '200': { $ref: '#/components/responses/Success' }
  /api/sessions/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Sessions]
      summary: Get session
      responses:
        '200': { description: Session, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Sessions]
      summary: Update session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                tabOrder: { type: integer }
                status: { type: string }
      responses:
        '200': { description: Updated session, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
    delete:
      tags: [Sessions]
      summary: Delete (close) session
      parameters:
        - { name: deleteWorktree, in: query, schema: { type: string, enum: ['true'] } }
        - { name: trash, in: query, schema: { type: string, enum: ['true'] } }
        - { name: cleanup, in: query, schema: { type: string, enum: ['true'] } }
        - { name: force, in: query, schema: { type: string, enum: ['true'] } }
      responses:
        '200': { $ref: '#/components/responses/Success' }
  /api/sessions/{id}/suspend:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Sessions]
      summary: Suspend session
      responses:
        '200': { description: Session, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
  /api/sessions/{id}/resume:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Sessions]
      summary: Resume session
      responses:
        '200': { description: Session, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
        '410': { description: tmux session no longer exists }
  /api/sessions/{id}/restart:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Sessions]
      summary: Restart an exited agent session
      responses:
        '200': { description: Session, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
  /api/sessions/{id}/spawn:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Sessions]
      summary: Spawn a child session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                terminalType: { type: string, enum: [shell, agent, file, browser] }
                agentProvider: { type: string }
                projectId: { type: string }
                workingDirectory: { type: string }
                profileId: { type: string }
      responses:
        '201': { description: Child session, content: { application/json: { schema: { $ref: '#/components/schemas/Session' } } } }
  /api/sessions/{id}/exec:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Sessions]
      summary: Execute a command (fire-and-forget)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command: { type: string }
                pressEnter: { type: boolean, default: true }
      responses:
        '200':
          description: Command sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  sessionId: { type: string }
                  command: { type: string }
                  message: { type: string }
        '410': { description: tmux session gone }
  /api/sessions/{id}/token:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Sessions]
      summary: Get a WebSocket auth token
      responses:
        '200':
          description: Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  sessionId: { type: string }
                  tmuxSessionName: { type: string }
                  expiresIn: { type: integer, example: 300 }
  /api/sessions/{id}/git-status:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Sessions]
      summary: Get git status for a session
      responses:
        '200': { description: Git status, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
  /api/sessions/{id}/folder:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    put:
      tags: [Sessions]
      summary: Move session to a project (legacy path name)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId: { type: string, nullable: true }
                folderId: { type: string, nullable: true, description: legacy alias }
      responses:
        '200': { $ref: '#/components/responses/Success' }
  # ===================== Session browser automation =====================
  /api/sessions/{id}/browser/navigate:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session Browser]
      summary: Navigate to a URL
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [url], properties: { url: { type: string } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /api/sessions/{id}/browser/screenshot:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Session Browser]
      summary: Capture a screenshot
      responses: { '200': { description: Screenshot result, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/sessions/{id}/browser/snapshot:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Session Browser]
      summary: Accessibility snapshot
      responses: { '200': { description: Snapshot, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/sessions/{id}/browser/click:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session Browser]
      summary: Click at coordinates
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [x, y], properties: { x: { type: number }, y: { type: number } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /api/sessions/{id}/browser/type:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session Browser]
      summary: Type text
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [text], properties: { text: { type: string } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /api/sessions/{id}/browser/evaluate:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session Browser]
      summary: Evaluate JavaScript
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [expression], properties: { expression: { type: string } } } } }
      responses: { '200': { description: Evaluation result, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/sessions/{id}/browser/back:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session Browser]
      summary: Navigate back
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /api/sessions/{id}/browser/forward:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session Browser]
      summary: Navigate forward
      responses: { '200': { $ref: '#/components/responses/Success' } }
  # ===================== Session MCP servers =====================
  /api/sessions/{id}/mcp-servers:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Session MCP]
      summary: Get MCP servers for a session
      responses: { '200': { description: MCP config, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    patch:
      tags: [Session MCP]
      summary: Update an MCP server config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverName, sourceFile, updates]
              properties:
                serverName: { type: string }
                sourceFile: { type: string }
                updates: { type: object, additionalProperties: true }
      responses: { '200': { description: Updated MCP config, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/sessions/{id}/mcp-servers/discover:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Session MCP]
      summary: Discover MCP servers for a session
      responses: { '200': { description: Discovery results, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }

  # ============================ Groups ============================
  /api/groups:
    get:
      tags: [Groups]
      summary: List groups
      responses:
        '200':
          description: Groups
          content:
            application/json:
              schema: { type: object, properties: { groups: { type: array, items: { $ref: '#/components/schemas/Group' } } } }
    post:
      tags: [Groups]
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, parentGroupId]
              properties:
                name: { type: string }
                parentGroupId: { type: string, nullable: true }
                sortOrder: { type: integer }
      responses:
        '201': { description: Created, content: { application/json: { schema: { type: object, properties: { group: { $ref: '#/components/schemas/Group' } } } } } }
  /api/groups/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Groups]
      summary: Get group
      responses: { '200': { description: Group, content: { application/json: { schema: { $ref: '#/components/schemas/Group' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    patch:
      tags: [Groups]
      summary: Update group
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { name: { type: string }, collapsed: { type: boolean }, sortOrder: { type: integer } }
      responses: { '200': { description: Updated group, content: { application/json: { schema: { $ref: '#/components/schemas/Group' } } } } }
    delete:
      tags: [Groups]
      summary: Delete group
      parameters: [{ name: force, in: query, schema: { type: boolean }, description: Required true when the group has descendants }]
      responses: { '200': { $ref: '#/components/responses/Success' }, '400': { $ref: '#/components/responses/BadRequest' } }
  /api/groups/{id}/move:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Groups]
      summary: Reparent group
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { newParentGroupId: { type: string, nullable: true } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }

  # ============================ Projects ============================
  /api/projects:
    get:
      tags: [Projects]
      summary: List projects
      parameters: [{ name: groupId, in: query, schema: { type: string } }]
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema: { type: object, properties: { projects: { type: array, items: { $ref: '#/components/schemas/Project' } } } }
    post:
      tags: [Projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupId, name]
              properties: { groupId: { type: string }, name: { type: string }, sortOrder: { type: integer } }
      responses: { '201': { description: Created, content: { application/json: { schema: { type: object, properties: { project: { $ref: '#/components/schemas/Project' } } } } } } }
  /api/projects/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Projects]
      summary: Get project
      responses: { '200': { description: Project, content: { application/json: { schema: { $ref: '#/components/schemas/Project' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    patch:
      tags: [Projects]
      summary: Update project
      requestBody:
        content: { application/json: { schema: { type: object, properties: { name: { type: string }, collapsed: { type: boolean }, sortOrder: { type: integer } } } } }
      responses: { '200': { description: Updated project, content: { application/json: { schema: { $ref: '#/components/schemas/Project' } } } } }
    delete:
      tags: [Projects]
      summary: Delete project
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /api/projects/{id}/move:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Projects]
      summary: Move project to another group
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [newGroupId], properties: { newGroupId: { type: string } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }
  /api/projects/{id}/open:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    post:
      tags: [Projects]
      summary: Open the project's default working directory (OS-level)
      responses: { '200': { $ref: '#/components/responses/Success' } }

  # ===================== Node preferences =====================
  /api/node-preferences/{ownerType}/{ownerId}:
    parameters:
      - { name: ownerType, in: path, required: true, schema: { type: string, enum: [group, project] } }
      - { name: ownerId, in: path, required: true, schema: { type: string } }
    get:
      tags: [NodePreferences]
      summary: Get node preferences
      responses: { '200': { description: Preferences, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    put:
      tags: [NodePreferences]
      summary: Upsert node preferences
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses: { '200': { description: Saved preferences, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    delete:
      tags: [NodePreferences]
      summary: Reset node preferences
      responses: { '200': { $ref: '#/components/responses/Success' } }

  # ===================== Preferences =====================
  /api/preferences:
    get:
      tags: [Preferences]
      summary: Get user settings and node preferences
      responses: { '200': { description: Preferences, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    patch:
      tags: [Preferences]
      summary: Update user settings
      requestBody:
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses: { '200': { description: Updated settings, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/preferences/active-node:
    post:
      tags: [Preferences]
      summary: Set the active node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId: { type: string, nullable: true }
                nodeType: { type: string, enum: [group, project], nullable: true }
                pinned: { type: boolean }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } } }

  # ===================== Templates =====================
  /api/templates:
    get:
      tags: [Templates]
      summary: List templates
      responses: { '200': { description: Templates, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } } }
    post:
      tags: [Templates]
      summary: Create template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                projectPath: { type: string }
                startupCommand: { type: string }
                theme: { type: string }
                fontSize: { type: integer }
                fontFamily: { type: string }
      responses: { '201': { description: Created template, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/templates/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Templates]
      summary: Get template
      responses: { '200': { description: Template, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    patch:
      tags: [Templates]
      summary: Update template
      requestBody: { content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses: { '200': { description: Updated template, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    delete:
      tags: [Templates]
      summary: Delete template
      responses: { '200': { $ref: '#/components/responses/Success' } }
    post:
      tags: [Templates]
      summary: Record template usage
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { action: { type: string, enum: [use] } } } } } }
      responses: { '200': { $ref: '#/components/responses/Success' } }

  # ===================== Recordings =====================
  /api/recordings:
    get:
      tags: [Recordings]
      summary: List recordings
      responses: { '200': { description: Recordings, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } } }
    post:
      tags: [Recordings]
      summary: Create recording
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, data, duration]
              properties:
                name: { type: string }
                data: { type: string, description: base64 }
                duration: { type: number }
                sessionId: { type: string }
      responses: { '201': { description: Created recording, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /api/recordings/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Recordings]
      summary: Get recording
      parameters: [{ name: parsed, in: query, schema: { type: string, enum: ['true'] } }]
      responses: { '200': { description: Recording, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    patch:
      tags: [Recordings]
      summary: Update recording metadata
      requestBody: { content: { application/json: { schema: { type: object, properties: { name: { type: string }, sessionId: { type: string } } } } } }
      responses: { '200': { description: Updated recording, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
    delete:
      tags: [Recordings]
