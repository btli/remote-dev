  # ===================== Automation: GitHub webhook =====================
  /api/webhooks/github:
    post:
      tags: [Automation]
      summary: GitHub event webhook (HMAC-SHA256 auth)
      description: >-
        Structurally mirrors /api/deploy. The raw body is read before JSON parse
        and the HMAC is computed over the raw bytes. A `ping` event returns
        `{ message: "pong" }`. Matched events dispatch agent runs fire-and-forget,
        so GitHub's delivery is never blocked on an agent launch.
      security: []
      parameters:
        - { name: X-Hub-Signature-256, in: header, required: true, schema: { type: string } }
        - { name: X-GitHub-Event, in: header, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true, description: GitHub webhook event payload } } } }
      responses:
        '200': { description: Pong (ping event), content: { application/json: { schema: { type: object, properties: { message: { type: string, example: pong } } } } } }
        '202': { description: Accepted (event dispatched), content: { application/json: { schema: { type: object, properties: { message: { type: string, example: accepted }, event: { type: string }, action: { type: string, nullable: true } } } } } }
        '400': { description: Invalid JSON body }
        '401': { description: Invalid signature }
        '503': { description: Webhooks not configured (GITHUB_WEBHOOK_SECRET unset) }

  # ===================== Crown (best-of-N) =====================
  /api/crown:
    get:
      tags: [Crown]
      summary: List Crown runs
      responses:
        '200':
          description: Crown runs
          content: { application/json: { schema: { type: object, properties: { runs: { type: array, items: { type: object, additionalProperties: true } } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Crown]
      summary: Start a Crown run
      description: Fans out N candidate agent runs asynchronously. Returns immediately; poll GET /api/crown/{id}.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CrownStartInput' } } } }
      responses:
        '202':
          description: Crown run started
          content: { application/json: { schema: { type: object, properties: { crownRunId: { type: string }, status: { type: string } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/crown/{id}:
    parameters: [{ $ref: '#/components/parameters/IdPath' }]
    get:
      tags: [Crown]
      summary: Get a Crown run (status + candidates + diffs + judge result)
      responses:
        '200': { description: Crown run detail, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Crown]
      summary: Manual override — open a PR for a chosen candidate
      description: Ignores the judge's winner and opens a PR for the operator-chosen candidate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, candidateId]
              properties:
                action: { type: string, enum: [pr] }
                candidateId: { type: string }
      responses:
        '200': { description: PR opened, content: { application/json: { schema: { type: object, properties: { prUrl: { type: string } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { description: Crown run or candidate not found (or candidate has no branch) }

