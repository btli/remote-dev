<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d5d6db"/>
      <stop offset="100%" stop-color="#e9e9ed"/>
    </linearGradient>
    <linearGradient id="promptGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3560d3"/>
      <stop offset="100%" stop-color="#8b5fcf"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="68" y="68" width="888" height="888" rx="92" ry="92"/>
    </clipPath>
  </defs>

  <!-- Terminal window background with rounded corners -->
  <rect x="64" y="64" width="896" height="896" rx="96" ry="96" fill="url(#termBg)" stroke="#b4b5c0" stroke-width="8"/>

  <!-- Title bar (clipped to terminal shape) -->
  <rect x="64" y="64" width="896" height="112" fill="#c4c5d0" clip-path="url(#termClip)"/>

  <!-- Window controls -->
  <circle cx="160" cy="120" r="24" fill="#f7768e"/>
  <circle cx="240" cy="120" r="24" fill="#e0af68"/>
  <circle cx="320" cy="120" r="24" fill="#9ece6a"/>

  <!-- Prompt symbol > -->
  <path d="M200 400 L360 520 L200 640" stroke="url(#promptGlow)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Underscore _ (positioned at baseline) -->
  <rect x="440" y="660" width="280" height="40" rx="8" fill="#3560d3" opacity="0.9"/>

  <!-- Output lines -->
  <rect x="200" y="760" width="560" height="28" rx="8" fill="#9a9bb0"/>
  <rect x="200" y="832" width="400" height="28" rx="8" fill="#9a9bb0"/>
</svg>
