# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — DO NOT COMMIT REAL VALUES.
#
# This file documents the shape of the `rdv-supervisor-config` Secret only. Apply
# the REAL Secret out-of-band — via sealed-secrets, SOPS, or an imperative
# `kubectl create secret` — and keep the populated manifest OUT of git:
#
#   kubectl -n rdv-system create secret generic rdv-supervisor-config \
#     --from-literal=SUPERVISOR_CF_ACCESS_TEAM=my-team \
#     --from-literal=SUPERVISOR_CF_ACCESS_AUD=<supervisor-app-aud> \
#     --from-literal=SUPERVISOR_INTERNAL_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=SUPERVISOR_ADMIN_EMAIL=admin@example.com \
#     --from-literal=SUPERVISOR_INSTANCE_HOST=dev.example.com \
#     --from-literal=SUPERVISOR_INSTANCE_IMAGE=ghcr.io/btli/remote-dev:<sha> \
#     --from-literal=SUPERVISOR_DEFAULT_STORAGE_CLASS=longhorn \
#     --from-literal=SUPERVISOR_DEFAULT_STORAGE_SIZE=10Gi \
#     --from-literal=CF_ACCESS_TEAM=my-team \
#     --from-literal=CF_ACCESS_AUD=<instances-app-aud>
#   # Optional (private-registry / mixed-arch instances) — append these flags,
#   # adding a trailing `\` to the CF_ACCESS_AUD line above first:
#     --from-literal=SUPERVISOR_INSTANCE_IMAGE_PULL_SECRET_NAME=harbor-registry
#     --from-literal=SUPERVISOR_INSTANCE_IMAGE_PULL_DOCKERCONFIGJSON="$(cat ~/.docker/config.json)"
#     --from-literal=SUPERVISOR_INSTANCE_NODE_SELECTOR=kubernetes.io/arch=amd64
#
# Both supervisor.yaml (web + controller) and router.yaml read keys from this
# Secret via `envFrom` / `secretKeyRef`. Cross-checked against
# apps/supervisor/.env.example and apps/supervisor-router/.env.example.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: rdv-supervisor-config
  namespace: rdv-system
  labels:
    managed-by: rdv-supervisor
type: Opaque
stringData:
  # ── The SUPERVISOR's OWN Cloudflare Access app (its own hostname, §15 M3) ──
  # Gates the operator dashboard on e.g. sup.example.com. This AUD is DISTINCT
  # from the instances' CF_ACCESS_AUD below; access to the Supervisor never
  # grants access to any instance.
  SUPERVISOR_CF_ACCESS_TEAM: "REPLACE_ME-cf-team-subdomain"
  SUPERVISOR_CF_ACCESS_AUD: "REPLACE_ME-supervisor-app-aud"

  # Shared secret the router presents to the Supervisor's GET /api/internal/routes
  # (header x-supervisor-internal-secret). MUST match on both sides; the router
  # reads the same key from this Secret. Generate: `openssl rand -base64 32`.
  SUPERVISOR_INTERNAL_SECRET: "REPLACE_ME-openssl-rand-base64-32"

  # First admin user — seeded as supervisor_user(role=admin) on startup.
  SUPERVISOR_ADMIN_EMAIL: "REPLACE_ME-admin@example.com"

  # ── Provisioning config (read by the controller/reconciler) ──
  # External host instances are served under: each instance gets
  # AUTH_URL=https://<host>/<slug>. This is the INSTANCES host (router), NOT the
  # supervisor host.
  SUPERVISOR_INSTANCE_HOST: "REPLACE_ME-dev.example.com"
  # The slug-aware instance image:sha the provisioner runs (never :latest, §9).
  SUPERVISOR_INSTANCE_IMAGE: "REPLACE_ME-ghcr.io/btli/remote-dev:<sha>"
  # Default PVC StorageClass + size for new instances (empty class -> cluster
  # default). Prefer a REPLICATED class (e.g. longhorn) for instance resiliency.
  SUPERVISOR_DEFAULT_STORAGE_CLASS: "REPLACE_ME-longhorn"
  SUPERVISOR_DEFAULT_STORAGE_SIZE: "10Gi"

  # ── The INSTANCES' Cloudflare Access app (the OTHER CF app, on the router's
  # host, §15 M3) ── Injected into every instance's `rdv-shared` Secret by the
  # provisioner so each instance validates the CF Access JWT itself. DISTINCT
  # AUD from SUPERVISOR_CF_ACCESS_AUD above.
  CF_ACCESS_TEAM: "REPLACE_ME-cf-team-subdomain"
  CF_ACCESS_AUD: "REPLACE_ME-instances-app-aud"

  # ── Optional: GitHub OAuth creds injected into each instance's rdv-<slug>
  # Secret. Omit the keys entirely if instances don't use GitHub features. ──
  # GITHUB_CLIENT_ID: "REPLACE_ME"
  # GITHUB_CLIENT_SECRET: "REPLACE_ME"

  # ── Optional: PRIVATE instance-image pull credential (remote-dev-2xhg). When
  # set, the provisioner references this Secret name in each instance pod's
  # imagePullSecrets; with the dockerconfigjson below ALSO set it CREATES that
  # per-instance dockerconfigjson Secret. Omit entirely for a public registry. ──
  SUPERVISOR_INSTANCE_IMAGE_PULL_SECRET_NAME: "REPLACE_ME-harbor-registry"
  # The raw .dockerconfigjson ({"auths":{...}}) — a SECRET. Uncomment + populate
  # only when the provisioner should CREATE the pull Secret (vs you provisioning
  # it out-of-band). Requires SUPERVISOR_INSTANCE_IMAGE_PULL_SECRET_NAME above.
  # SUPERVISOR_INSTANCE_IMAGE_PULL_DOCKERCONFIGJSON: 'REPLACE_ME-{"auths":{...}}'

  # ── Optional: pin instance pods to compatible nodes on a mixed-arch cluster
  # (remote-dev-389c). Comma-separated key=value (e.g. kubernetes.io/arch=amd64).
  # Omit for no pinning. ──
  SUPERVISOR_INSTANCE_NODE_SELECTOR: "REPLACE_ME-kubernetes.io/arch=amd64"
