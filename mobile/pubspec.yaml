name: remote_dev
description: Remote Dev mobile app
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP + cookies
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # WebView
  flutter_inappwebview: ^6.1.5

  # Routing
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Biometric / device credential auth (Phase 5)
  local_auth: ^2.3.0

  # Connectivity awareness (used in Phase 2 error surface; install now)
  connectivity_plus: ^6.0.5

  # Push notifications (Phase 3)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Deep links (Phase 4)
  app_links: ^6.3.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UUID for serverId
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # Native splash screen
  flutter_native_splash: ^2.4.6

  # Launcher icon generation
  flutter_launcher_icons: ^0.14.1

  # Test helpers
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/splash/
    - assets/icon/

flutter_native_splash:
  color: "#1A1B26"
  image: assets/splash/logo.png
  branding: assets/splash/wordmark.png
  branding_mode: bottom
  android_12:
    color: "#1A1B26"
    image: assets/splash/logo_android12.png
    branding: assets/splash/wordmark.png
  fullscreen: true
  android_gravity: center
  ios_content_mode: center

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1A1B26"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
