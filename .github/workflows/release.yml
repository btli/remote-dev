name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUN_VERSION: "latest"
  NODE_VERSION: "22"

jobs:
  # ─── Build web application (shared across platforms) ──────────────────────
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js (standalone)
        run: bun run build

      - name: Build terminal server
        run: bun run terminal:build

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            .next/standalone/
            .next/static/
            dist-terminal/
            scripts/standalone-server.js
            scripts/pack-release.sh
            scripts/install.sh
            scripts/service-config/
            drizzle/
            public/
            package.json
            node_modules/node-pty/
            node_modules/better-sqlite3/
            node_modules/@libsql/
          retention-days: 1

  # ─── Build rdv CLI + pack tarball per platform ────────────────────────────
  build-release:
    name: Build ${{ matrix.platform }}
    needs: build-web
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
          - platform: darwin-arm64
            runner: macos-14
            rust-target: aarch64-apple-darwin
          - platform: darwin-x64
            runner: macos-13
            rust-target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install cross (for cross-compilation)
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build rdv CLI
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --manifest-path crates/rdv/Cargo.toml --target ${{ matrix.rust-target }}
          else
            cargo build --release --manifest-path crates/rdv/Cargo.toml --target ${{ matrix.rust-target }}
          fi

      - name: Rebuild native modules for target platform
        if: "!matrix.use-cross"
        run: |
          # Rebuild node-pty and better-sqlite3 for the target platform
          cd node_modules/node-pty && node-gyp rebuild 2>/dev/null || true
          cd ../../node_modules/better-sqlite3 && node-gyp rebuild 2>/dev/null || true

      - name: Pack release tarball
        run: |
          chmod +x scripts/pack-release.sh
          bash scripts/pack-release.sh \
            --platform ${{ matrix.platform }} \
            --rdv-binary crates/rdv/target/${{ matrix.rust-target }}/release/rdv

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*.tar.gz
          retention-days: 1

  # ─── Build Android APK ───────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp mobile/build/app/outputs/flutter-apk/app-debug.apk \
             mobile/build/app/outputs/flutter-apk/remote-dev-${VERSION}-android-debug.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: mobile/build/app/outputs/flutter-apk/remote-dev-*-android-debug.apk
          retention-days: 1

  # ─── Create GitHub Release ────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [build-release, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.apk > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1;next} /^## \[/{found=0} found" CHANGELOG.md 2>/dev/null || echo "Release $VERSION")
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Remote Dev $GITHUB_REF_NAME" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            dist/*.tar.gz \
            dist/*.apk \
            dist/checksums.txt
